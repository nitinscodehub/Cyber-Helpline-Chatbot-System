name: cyber_helpline
description: "24/7 Cyber Helpline Chatbot - AI Powered Security Assistant"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1
  animations: ^2.0.11
  lottie: ^3.1.2
  shimmer: ^3.0.0
  animate_do: ^3.3.4
  
  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  
  # Network & API
  http: ^1.2.1
  connectivity_plus: ^6.0.5
  url_launcher: ^6.3.0
  
  # Local Storage
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  flutter_secure_storage: ^9.2.2
  
  # AI/ML
  # speech_to_text: ^6.6.0   ← HATA DIYA
  translator: ^1.0.4+1
  
  # Utilities
  intl: ^0.19.0
  share_plus: ^9.0.0
  image_picker: ^1.1.2
  file_picker: ^8.0.6
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  local_auth: ^2.2.0
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    # - assets/animations/   ← COMMENT KAR DIYA
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#1976D2"
  image: assets/images/splash_logo.png
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ic_launcher.png"
  adaptive_icon_background: "#1976D2"